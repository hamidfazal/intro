<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Fazal | Wellness Screening V2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      body {
        background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .card {
        max-width: 780px;
        width: 100%;
        background: white;
        border-radius: 32px;
        padding: 40px 35px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }

      /* ===== HEADER WITH PROFILE IMAGE ===== */
      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        border-bottom: 2px solid #d1fae5;
        padding-bottom: 18px;
        margin-bottom: 22px;
        flex-wrap: wrap;
      }
      .profile-img {
        flex-shrink: 0;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #047857;
        background: #d1fae5;
      }
      .header-text {
        flex: 1;
      }
      .header-text h1 {
        font-size: 26px;
        color: #065f46;
        letter-spacing: -0.3px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .header-text h1 .urdu-name {
        font-family: 'Noto Nastaliq Urdu', 'Alvi Nastaleeq', 'Jameel Noori Nastaleeq', sans-serif;
        font-size: 22px;
        font-weight: 400;
        color: #0d9488;
        direction: rtl;
      }
      .header-text .creds {
        color: #047857;
        font-weight: 600;
        font-size: 14px;
        margin-top: 2px;
      }
      .header-text .tagline {
        font-size: 13px;
        color: #4b5563;
        margin-top: 2px;
      }
      .header-text .tagline .urdu {
        font-family: 'Noto Nastaliq Urdu', 'Alvi Nastaleeq', 'Jameel Noori Nastaleeq', sans-serif;
        font-size: 16px;
        direction: rtl;
        color: #6b7280;
      }

      /* --- rest of the CSS (unchanged) --- */
      .urdu {
        font-family: 'Noto Nastaliq Urdu', 'Alvi Nastaleeq', 'Jameel Noori Nastaleeq', sans-serif;
        font-size: 18px;
        color: #4b5563;
        direction: rtl;
      }
      .progress-container {
        margin-bottom: 28px;
      }
      .step-indicators {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .step-indicators span {
        font-size: 13px;
        font-weight: 600;
        color: #94a3b8;
        transition: 0.3s;
      }
      .step-indicators span.active {
        color: #047857;
      }
      .progress-bar {
        width: 100%;
        height: 6px;
        background: #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-bar .fill {
        height: 100%;
        background: #047857;
        transition: width 0.4s ease;
        width: 0%;
        border-radius: 10px;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 14px;
        color: #1e293b;
        margin-top: 18px;
        margin-bottom: 5px;
      }
      label .urdu-tag {
        font-weight: 400;
        color: #6b7280;
        font-size: 13px;
        margin-left: 8px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid #e2e8f0;
        border-radius: 16px;
        font-size: 15px;
        transition: 0.15s;
        background: #fafcfc;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #10b981;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        background: white;
      }
      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 6px;
      }
      .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 400;
        font-size: 14px;
        margin-top: 0;
        background: #f8fafc;
        padding: 8px 14px;
        border-radius: 30px;
        border: 1.5px solid #e2e8f0;
        cursor: pointer;
      }
      .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #047857;
      }
      .danger-zone {
        background: #fef2f2;
        border: 2px solid #fca5a5;
        border-radius: 20px;
        padding: 20px;
        margin: 22px 0;
      }
      .danger-zone label {
        color: #991b1b;
        margin-top: 0;
      }
      .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 28px;
      }
      .btn-row button {
        flex: 1;
        padding: 16px;
        border: none;
        border-radius: 40px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.15s;
      }
      .btn-primary {
        background: #047857;
        color: white;
        box-shadow: 0 8px 18px rgba(4, 120, 87, 0.3);
      }
      .btn-primary:hover {
        background: #065f46;
        transform: scale(1.01);
      }
      .btn-secondary {
        background: #e2e8f0;
        color: #1e293b;
      }
      .btn-secondary:hover {
        background: #cbd5e1;
      }
      .btn-primary:disabled,
      .btn-secondary:disabled {
        opacity: 0.5;
        pointer-events: none;
      }
      .status {
        margin-top: 18px;
        padding: 14px;
        border-radius: 16px;
        text-align: center;
        font-weight: 600;
        display: none;
      }
      .status.success {
        display: block;
        background: #d1fae5;
        color: #065f46;
      }
      .status.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
      }
      .footer-note {
        margin-top: 24px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        border-top: 1px solid #e2e8f0;
        padding-top: 18px;
      }
      .step-content {
        animation: fadeIn 0.25s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0.5;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (max-width: 500px) {
        .card {
          padding: 24px 18px;
        }
        .row-2 {
          grid-template-columns: 1fr;
        }
        .btn-row {
          flex-direction: column;
        }
        .header {
          flex-direction: column;
          text-align: center;
        }
        .header-text h1 {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== REACT ROOT ===== -->
    <div id="root"></div>

    <!-- ===== REACT ENTRY ===== -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
