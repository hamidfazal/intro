<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Fazal | Wellness Screening</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      body {
        background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .card {
        max-width: 720px;
        width: 100%;
        background: white;
        border-radius: 32px;
        padding: 40px 35px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        transition: 0.2s;
      }
      .header {
        text-align: center;
        border-bottom: 2px solid #d1fae5;
        padding-bottom: 20px;
        margin-bottom: 28px;
      }
      .header h1 {
        font-size: 28px;
        color: #065f46;
        letter-spacing: -0.5px;
      }
      .header .sub {
        color: #047857;
        font-weight: 500;
        font-size: 14px;
        margin-top: 4px;
      }
      .urdu {
        font-family: 'Noto Nastaliq Urdu', 'Alvi Nastaleeq', 'Jameel Noori Nastaleeq', sans-serif;
        font-size: 18px;
        color: #4b5563;
        direction: rtl;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 14px;
        color: #1e293b;
        margin-top: 18px;
        margin-bottom: 5px;
      }
      label .urdu-tag {
        font-weight: 400;
        color: #6b7280;
        font-size: 13px;
        margin-left: 8px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid #e2e8f0;
        border-radius: 16px;
        font-size: 15px;
        transition: 0.15s;
        background: #fafcfc;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #10b981;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        background: white;
      }
      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .danger-zone {
        background: #fef2f2;
        border: 2px solid #fca5a5;
        border-radius: 20px;
        padding: 20px;
        margin: 22px 0;
      }
      .danger-zone label {
        color: #991b1b;
        margin-top: 0;
      }
      .btn {
        width: 100%;
        padding: 16px;
        background: #047857;
        color: white;
        font-size: 18px;
        font-weight: 700;
        border: none;
        border-radius: 40px;
        margin-top: 28px;
        cursor: pointer;
        transition: 0.15s;
        box-shadow: 0 8px 18px rgba(4, 120, 87, 0.3);
      }
      .btn:hover {
        background: #065f46;
        transform: scale(1.01);
      }
      .btn:disabled {
        opacity: 0.6;
        pointer-events: none;
      }
      .status {
        margin-top: 18px;
        padding: 14px;
        border-radius: 16px;
        text-align: center;
        font-weight: 600;
        display: none;
      }
      .status.success {
        display: block;
        background: #d1fae5;
        color: #065f46;
      }
      .status.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
      }
      .footer-note {
        margin-top: 24px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        border-top: 1px solid #e2e8f0;
        padding-top: 18px;
      }
      @media (max-width: 500px) {
        .card {
          padding: 24px 18px;
        }
        .row-2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
